version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: afriquia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afriquia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afriquia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: afriquia-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: afriquia-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
